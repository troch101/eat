services:
  postgres:
    image: postgres:16-alpine
    container_name: minicook-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-minicook}
      POSTGRES_USER: ${POSTGRES_USER:-minicook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minicook_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: minicook-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2026-06-13T11-33-47Z
    container_name: minicook-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minicook}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minicook_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  minio-data:
